<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>ID Card Worksheet</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        min-height: 100vh;
      }
      .card {
        border: 3px solid #fff;
        padding: 30px;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .header img { 
        max-width: 80px;
        height: auto;
        margin-bottom: 15px;
      }
      .header h2 {
        color: #333;
        font-size: 2.5em;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }
      .flag-display {
        font-size: 4em;
        margin: 10px 0;
        min-height: 60px;
      }
      .field-group {
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 2px solid #ddd;
      }
      .field-group:last-child {
        border-bottom: none;
      }
      .field-label {
        font-weight: 700;
        color: #333;
        font-size: 1.1em;
        margin-bottom: 10px;
        display: block;
      }
      .field-label span {
        color: #667eea;
      }
      .field-input-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .field-prefix {
        color: #666;
        font-weight: 500;
      }
      input, textarea { 
        padding: 10px 15px;
        border: 2px solid #667eea;
        border-radius: 8px;
        font-size: 14px;
        font-family: 'Segoe UI', sans-serif;
        transition: border-color 0.3s, box-shadow 0.3s;
        flex: 1;
        min-width: 200px;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: #764ba2;
        box-shadow: 0 0 8px rgba(118, 75, 162, 0.3);
        background: #fff;
      }
      .field-suffix {
        color: #666;
        font-weight: 500;
      }
      button { 
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-top: 35px;
        padding: 14px 35px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      button:hover:not(:disabled) { 
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }
      button:disabled { 
        background: #ccc;
        cursor: not-allowed;
        opacity: 0.6;
      }
      #results { 
        margin-top: 40px;
        padding: 30px;
        background: linear-gradient(135deg, #fff3cd 0%, #ffe699 100%);
        border: 3px solid #ffc107;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .error { 
        color: #d32f2f;
        font-weight: 700;
      }
      .error-message {
        background: #ffebee;
        border-left: 4px solid #d32f2f;
        padding: 12px;
        margin: 10px 0;
        border-radius: 4px;
        color: #c62828;
      }
      .success-message {
        background: #e8f5e9;
        border-left: 4px solid #388e3c;
        padding: 12px;
        margin: 10px 0;
        border-radius: 4px;
        color: #1b5e20;
      }
      .perfect-banner {
        background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        color: white;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        font-size: 1.3em;
        font-weight: 700;
        margin-bottom: 20px;
      }
      .paragraph-section {
        background: white;
        padding: 25px;
        border-radius: 12px;
        margin-top: 20px;
        border: 2px solid #4caf50;
      }
      .paragraph-section h3 {
        color: #4caf50;
        margin-bottom: 15px;
        font-size: 1.2em;
      }
      .paragraph-text {
        font-size: 1.05em;
        line-height: 1.8;
        color: #333;
        text-align: justify;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLg__6S81P_1_yXgXXlgtWnbK6PmFKb5eVPA&s" alt="ID Card">
        <h2>🌍 ID CARD</h2>
        <div class="flag-display" id="flagDisplay"></div>
      </div>

      <div id="formContainer">
        <div class="field-group">
          <label class="field-label"><span>NAME:</span></label>
          <div class="field-input-wrapper">
            <span class="field-prefix">My name is</span>
            <input type="text" id="name" placeholder="Enter your name">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label"><span>COUNTRY:</span></label>
          <div class="field-input-wrapper">
            <span class="field-prefix">I am from</span>
            <input type="text" id="country" placeholder="Enter your country">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label"><span>NATIONALITY:</span></label>
          <div class="field-input-wrapper">
            <span class="field-prefix">I am</span>
            <input type="text" id="nationality" placeholder="a/an Nationality">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label"><span>FAMOUS FOOD:</span></label>
          <div class="field-input-wrapper">
            <input type="text" id="food" placeholder="Enter famous food">
            <span class="field-suffix">is a famous food in my country</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label"><span>POPULAR PLACE:</span></label>
          <div class="field-input-wrapper">
            <span class="field-prefix">In my country,</span>
            <textarea id="place" rows="1" placeholder="Enter popular place"></textarea>
            <span class="field-suffix">is a popular place</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label"><span>NATIONAL LANGUAGE:</span></label>
          <div class="field-input-wrapper">
            <span class="field-prefix">My country's national language is</span>
            <textarea id="language" rows="1" placeholder="Enter language"></textarea>
          </div>
        </div>

        <button id="submitBtn">Submit</button>
      </div>
    </div>
    <div id="results"></div>

    <script>
      // Country to flag mapping
      const countryFlags = {
        'united states': '🇺🇸',
        'usa': '🇺🇸',
        'united kingdom': '🇬🇧',
        'uk': '🇬🇧',
        'india': '🇮🇳',
        'france': '🇫🇷',
        'germany': '🇩🇪',
        'japan': '🇯🇵',
        'china': '🇨🇳',
        'australia': '🇦🇺',
        'canada': '🇨🇦',
        'brazil': '🇧🇷',
        'mexico': '🇲🇽',
        'spain': '🇪🇸',
        'italy': '🇮🇹',
        'south korea': '🇰🇷',
        'korea': '🇰🇷',
        'thailand': '🇹🇭',
        'singapore': '🇸🇬',
        'malaysia': '🇲🇾',
        'indonesia': '🇮🇩',
        'philippines': '🇵🇭',
        'vietnam': '🇻🇳',
        'russia': '🇷🇺',
        'egypt': '🇪🇬',
        'south africa': '🇿🇦',
        'pakistan': '🇵🇰',
        'bangladesh': '🇧🇩',
        'sri lanka': '🇱🇰',
        'new zealand': '🇳���',
        'new zealand': '🇳🇿',
      };

      function getValue(id) {
        return document.getElementById(id).value.trim();
      }

      function checkAllFieldsFilled() {
        const fields = ['name', 'country', 'nationality', 'food', 'place', 'language'];
        return fields.every(id => getValue(id).length > 0);
      }

      function updateFlagDisplay() {
        const countryInput = getValue('country').toLowerCase();
        const flag = countryFlags[countryInput] || '🌍';
        document.getElementById('flagDisplay').textContent = flag;
      }

      function updateButtonState() {
        const btn = document.getElementById('submitBtn');
        const allFilled = checkAllFieldsFilled();
        btn.disabled = !allFilled;
        btn.textContent = allFilled ? '✅ Submit' : '⚠️ Fill all fields to submit';
      }

      // Update on input
      document.getElementById('country').addEventListener('input', updateFlagDisplay);
      ['name', 'country', 'nationality', 'food', 'place', 'language'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateButtonState);
      });

      function validateCapitalAndFullStop(value, label) {
        if (value.length === 0) {
          return { isValid: false, message: `${label} cannot be empty.` };
        }

        if (!/^[A-Z]/.test(value)) {
          return { isValid: false, message: `${label} must start with a capital letter.` };
        }

        if (!value.endsWith('.')) {
          return { isValid: false, message: `${label} must end with a full stop (.)` };
        }

        return { isValid: true, message: null };
      }

      function validateCapitalOnly(value, label) {
        if (value.length === 0) {
          return { isValid: false, message: `${label} cannot be empty.` };
        }

        if (!/^[A-Z]/.test(value)) {
          return { isValid: false, message: `${label} must start with a capital letter.` };
        }

        return { isValid: true, message: null };
      }

      function validateNationality(value, label) {
        if (value.length === 0) {
          return { isValid: false, message: `${label} cannot be empty.` };
        }

        const startsWithArticle = value.toLowerCase().startsWith('a ') || value.toLowerCase().startsWith('an ');
        if (!startsWithArticle) {
          return { isValid: false, message: `${label} must start with "a" or "an".` };
        }

        const nationalityPart = value.substring(value.indexOf(' ') + 1);

        if (!/^[A-Z]/.test(nationalityPart)) {
          return { isValid: false, message: `${label} nationality must start with a capital letter.` };
        }

        return { isValid: true, message: null };
      }

      async function checkGrammar() {
        const resultsDiv = document.getElementById('results');

        if (!checkAllFieldsFilled()) {
          resultsDiv.innerHTML = '<div class="error-message">❌ Please fill in all fields before submitting!</div>';
          return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        resultsDiv.innerHTML = '<p style="text-align: center; font-weight: bold;">⏳ Checking...</p>';

        const nameValue = getValue('name');
        const countryValue = getValue('country');
        const nationalityValue = getValue('nationality');
        const foodValue = getValue('food');
        const placeValue = getValue('place');
        const languageValue = getValue('language');

        let anyErrors = false;
        let html = '';
        let allSentences = {};

        // Validate NAME (requires full stop)
        const nameValidation = validateCapitalAndFullStop(nameValue, 'Name');
        allSentences.name = `My name is ${nameValue}`;
        if (!nameValidation.isValid) {
          anyErrors = true;
          html += `<div class="error-message">❌ <strong>Name:</strong> ${nameValidation.message}</div>`;
        } else {
          html += `<div class="success-message">✅ <strong>Name:</strong> "My name is ${nameValue}"</div>`;
        }

        // Validate COUNTRY (requires full stop)
        const countryValidation = validateCapitalAndFullStop(countryValue, 'Country');
        allSentences.country = `I am from ${countryValue}`;
        if (!countryValidation.isValid) {
          anyErrors = true;
          html += `<div class="error-message">❌ <strong>Country:</strong> ${countryValidation.message}</div>`;
        } else {
          html += `<div class="success-message">✅ <strong>Country:</strong> "I am from ${countryValue}"</div>`;
        }

        // Validate NATIONALITY (a/an + capital letter, no full stop)
        const nationalityValidation = validateNationality(nationalityValue, 'Nationality');
        allSentences.nationality = `I am ${nationalityValue}`;
        if (!nationalityValidation.isValid) {
          anyErrors = true;
          html += `<div class="error-message">❌ <strong>Nationality:</strong> ${nationalityValidation.message}</div>`;
        } else {
          html += `<div class="success-message">✅ <strong>Nationality:</strong> "I am ${nationalityValue}."</div>`;
        }

        // Validate FOOD (capital letter only, no full stop)
        const foodValidation = validateCapitalOnly(foodValue, 'Famous Food');
        allSentences.food = `${foodValue} is a famous food in my country`;
        if (!foodValidation.isValid) {
          anyErrors = true;
          html += `<div class="error-message">❌ <strong>Famous Food:</strong> ${foodValidation.message}</div>`;
        } else {
          html += `<div class="success-message">✅ <strong>Famous Food:</strong> "${foodValue} is a famous food in my country."</div>`;
        }

        // Validate PLACE (capital letter only, no full stop)
        const placeValidation = validateCapitalOnly(placeValue, 'Popular Place');
        allSentences.place = `In my country, ${placeValue} is a popular place`;
        if (!placeValidation.isValid) {
          anyErrors = true;
          html += `<div class="error-message">❌ <strong>Popular Place:</strong> ${placeValidation.message}</div>`;
        } else {
          html += `<div class="success-message">✅ <strong>Popular Place:</strong> "In my country, ${placeValue} is a popular place."</div>`;
        }

        // Validate LANGUAGE (requires full stop)
        const languageValidation = validateCapitalAndFullStop(languageValue, 'National Language');
        allSentences.language = `My country's national language is ${languageValue}`;
        if (!languageValidation.isValid) {
          anyErrors = true;
          html += `<div class="error-message">❌ <strong>National Language:</strong> ${languageValidation.message}</div>`;
        } else {
          html += `<div class="success-message">✅ <strong>National Language:</strong> "My country's national language is ${languageValue}"</div>`;
        }

        // If no errors, show paragraph form
        if (!anyErrors) {
          const paragraph = `${allSentences.name}. ${allSentences.country}. ${allSentences.nationality}. ${allSentences.food}. ${allSentences.place}. ${allSentences.language}.`;
          html = '<div class="perfect-banner">🎉 Perfect! No errors found.</div>' + html;
          html += `<div class="paragraph-section">
            <h3>📖 Your Complete Paragraph:</h3>
            <p class="paragraph-text">${paragraph}</p>
          </div>`;
        }

        resultsDiv.innerHTML = html;
        btn.disabled = false;
      }

      document.getElementById('submitBtn').addEventListener('click', checkGrammar);

      // Initialize button state
      updateButtonState();
    </script>
  </body>
</html>
